name: prioritask
description: A task management app for students to track and prioritize their assignments.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  http: ^1.1.0
  shared_preferences: ^2.2.2
  provider: ^6.1.1
  intl: ^0.19.0
  flutter_local_notifications: ^17.0.0
  table_calendar: ^3.0.9
  percent_indicator: ^4.2.3
  image_picker: ^1.0.7
  flutter_slidable: ^3.0.1
  cached_network_image: ^3.3.1
  uuid: ^4.3.3
  flutter_svg: ^2.0.10+1
  lottie: ^3.0.0
  shimmer: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
